<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fillo Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Fillo</p>
        <h1>Profiles, saved forms, and settings</h1>
        <p class="muted">Your profiles and saved forms stay private on this browser unless you choose to back them up.</p>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>Settings</h2>
          <p id="status" class="status"></p>
        </div>
        <div class="settings-grid">
          <div class="settings-primary">
            <label class="stack-field">
              <span>Default profile</span>
              <select id="default-profile"></select>
            </label>
          </div>
          <div class="settings-toggles">
            <label class="toggle">
              <input type="checkbox" id="auto-load-profile" />
              <span>Automatically apply matching profile details</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="confirm-before-fill" />
              <span>Ask before filling a form</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="show-backup-section" />
              <span>Show backup and restore tools</span>
            </label>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Profiles</h2>
          <button id="add-profile" class="button">Add profile</button>
        </div>
        <div id="profiles" class="card-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Saved forms</h2>
        </div>
        <div id="presets" class="card-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Form history</h2>
        </div>
        <div id="history" class="card-list"></div>
      </section>

      <section id="backup-section" class="panel hidden">
        <div class="panel-head">
          <h2>Backup And Restore</h2>
        </div>
        <div class="backup-selectors">
          <div class="selector-group">
            <p class="selector-title">Export sections</p>
            <label class="toggle">
              <input type="checkbox" id="export-profiles" checked />
              <span>Profiles</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="export-presets" checked />
              <span>Saved forms</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="export-settings" checked />
              <span>Settings</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="export-history" checked />
              <span>Form history</span>
            </label>
          </div>
          <div class="selector-group">
            <p class="selector-title">Restore sections</p>
            <label class="toggle">
              <input type="checkbox" id="import-profiles" checked />
              <span>Profiles</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="import-presets" checked />
              <span>Saved forms</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="import-settings" checked />
              <span>Settings</span>
            </label>
            <label class="toggle">
              <input type="checkbox" id="import-history" checked />
              <span>Form history</span>
            </label>
          </div>
        </div>
        <div class="backup-actions">
          <button id="export-data" class="button">Download backup</button>
          <button id="import-data" class="button">Restore backup</button>
          <button id="clear-data" class="button danger">Clear all saved data</button>
        </div>
        <textarea id="backup-payload" rows="14" spellcheck="false" placeholder="Your backup will appear here. Paste a previous backup here to restore it."></textarea>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Privacy</h2>
        </div>
        <div id="storage-summary" class="privacy-panel"></div>
        <div class="backup-actions">
          <button id="clear-history" class="button">Clear form history</button>
        </div>
      </section>
    </main>

    <script type="module" src="./options/index.js"></script>
  </body>
</html>
